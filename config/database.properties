# 数据库配置文件
# Database Configuration File
# 请根据实际情况修改以下配置
# Please modify the following configuration according to actual situation

# MySQL 数据库地址
db.url=jdbc:mysql://localhost:3306/rural_water_db?useSSL=false&characterEncoding=utf8

# MySQL 用户名
db.username=root

# MySQL 密码
db.password=

# MySQL 驱动类名
db.driver=com.mysql.jdbc.Driver

# 连接池配置（可选，预留扩展）
# Connection pool configuration (optional, for future extension)
db.initialSize=5
db.maxActive=20
db.minIdle=2
db.maxWait=10000
